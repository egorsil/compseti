<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 1</title>
</head>
<body>

    <input type="text" id="username" placeholder="Введите ваше имя">
    <button id="greet-btn">Сказать привет</button>
    <p id="result"></p>

    <script>
        let input = document.querySelector("#username");
        let button = document.querySelector("#greet-btn");
        let resultParagraph = document.querySelector("#result");

        button.onclick = function() {
            let name = input.value;

            if (name === "") {
                resultParagraph.textContent = "Вы не ввели имя";
            } else {
                resultParagraph.textContent = "Привет, " + name + "! Добро пожаловать на сайт";
            }
        };
    </script>

</body>
</html>

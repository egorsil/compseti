<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Задание 1</title>
</head>
<body>
    <input type="number" id="numberInput" placeholder="Введите число">
    <button id="checkBtn">Проверить</button>
    <p id="message"></p>

    <script>
        let button = document.querySelector("#checkBtn");
        let input = document.querySelector("#numberInput");
        let output = document.querySelector("#message");

        button.onclick = function() {
            let value = input.value;
            
            if (value === "") {
                output.textContent = "Введите число";
                output.style.color = "red";
            } else {
                let number = Number(value); 
                
                if (number % 2 === 0) {
                    output.textContent = "Чётное";
                    output.style.color = "green";
                } else {
                    output.textContent = "Нечётное";
                    output.style.color = "blue";
                }
            }
        };
    </script>
</body>
</html>
